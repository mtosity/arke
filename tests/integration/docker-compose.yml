version: "3"
services:
  arke:
    build:
      dockerfile: Dockerfile.arke
      context: .
    deploy:
    image: tests_arke:latest
    networks:
    - arketest
    ports:
      - "50051:50051"
    environment:
      - LOG_FORMAT=term
      - LOG_LEVEL=debug
  rabbitmq:
    image: rabbitmq:3.7-management
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_SSL_CACERTFILE=/certs/testca/ca_certificate.pem
      - RABBITMQ_SSL_CERTFILE=/certs/server/server_certificate.pem
      - RABBITMQ_SSL_KEYFILE=/certs/server/private_key.pem
      - RABBITMQ_SSL_VERIFY=verify_none
    ports:
      - "5672:5672"
      - "5671:5671"
      - "15672:15672"
      - "15671:15671"
    networks:
    - arketest
    volumes:
    - ./certs:/certs
networks:
  arketest:

