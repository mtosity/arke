version: "3"
services:
  arke:
    build:
      dockerfile: Dockerfile.arke
      context: .
    image: tests_arke:latest
    networks:
    - arketest
    ports:
      - "50051:50051"
    environment:
      - LOG_FORMAT=term
      - LOG_LEVEL=debug
      - CERT_FILE=/certs/server/arke.pem
      - CERT_KEY=/certs/server/arke.key
      - CA_BUNDLE=/certs/testca/ca_certificate.pem
    volumes:
    - ./certs:/certs
  rabbitmq:
    image: rabbitmq:3.9-management
    ports:
      - "5672:5672"
      - "5671:5671"
      - "15672:15672"
      - "15671:15671"
    networks:
    - arketest
    volumes:
    - ./certs:/certs
    - ./rabbitmq.conf:/etc/rabbitmq/conf.d/00-rabbitmq.conf
networks:
  arketest:

