---
services:
  arke:
    build:
      dockerfile: Dockerfile.arke
      context: .
    image: tests_arke:latest
    networks:
      - arketest
    ports:
      - "50051:50051"
    environment:
      - LOG_FORMAT=term
      - LOG_LEVEL=debug
      - CERT_FILE=/certs/server/arke.pem
      - CERT_KEY=/certs/server/arke.key
      - CA_BUNDLE=/certs/testca/ca_certificate.pem
      - RATE_LIMIT_ENFORCED=true
      - RATE_LIMIT_BUCKET_SIZE=10
      - RATE_LIMIT_REFILL_SECONDS=10
      - RATE_LIMIT_MAX_AGE_STALE_CLIENTS=600
      - RATE_LIMIT_DEBUG_METHODS=true
      - GOCOVERDIR=/coverage/integration
    volumes:
      - ./certs:/certs
      - ./coverage:/coverage
  rabbitmq:
    build:
      dockerfile: Dockerfile.rabbitmq
      context: .
    image: tests_rabbitmq:latest
    ports:
      - "5552:5552"
      - "5672:5672"
      - "5671:5671"
      - "15672:15672"
      - "15671:15671"
    networks:
      - arketest
    volumes:
      - ./certs:/certs
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/00-rabbitmq.conf
    hostname: rabbitmq
networks:
  arketest:
